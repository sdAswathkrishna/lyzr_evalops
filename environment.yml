name: lyzr-evalops
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pip:
      # LangChain core
      - langchain==0.3.25
      - langchain-openai==0.3.16
      - langchain-community==0.3.24

