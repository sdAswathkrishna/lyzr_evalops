{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-center h-64">
  <div class="text-center">
    <div class="w-16 h-16 gradient-header rounded-2xl flex items-center justify-center mx-auto mb-4">
      <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>

    <h2 class="text-xl font-semibold text-gray-700 mb-2">Chat UI — Coming Next</h2>
    <p class="text-gray-400 text-sm">Frontend implementation in progress.</p>
    <p class="text-gray-400 text-sm mt-1">Backend API at <code class="bg-gray-100 px-1 rounded">POST /api/chat</code> is live and ready.</p>
  </div>
</div>
{% endblock %}
